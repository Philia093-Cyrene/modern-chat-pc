                // 更新频谱canvas尺寸
                updateSpectrumSize();
                
                window.dispatchEvent(new Event('resize'));
            }, 100);
        });
        
        // 更新频谱canvas尺寸
        function updateSpectrumSize() {
            if (!spectrumCanvas || !spectrumContainer) return;
            
            const rect = spectrumContainer.getBoundingClientRect();
            spectrumCanvas.width = rect.width * window.devicePixelRatio;
            spectrumCanvas.height = rect.height * window.devicePixelRatio;
            spectrumCanvas.style.width = rect.width + 'px';
            spectrumCanvas.style.height = rect.height + 'px';
        }
        
        // 键盘事件处理（Esc退出全屏）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.fullscreenElement) {
                document.exitFullscreen();
            }
        });
        
        // 显示视频详细信息
        async function showVideoInfo() {
            let params = getUrlParams();
            let videoUrl = params.url;
            
            // 获取视频信息
            const info = await getVideoInfo(videoUrl);
            
            // 更新弹窗内容
            document.getElementById('infoFormat').textContent = info.format || '未知';
            document.getElementById('infoSize').textContent = info.size || '未知';
            document.getElementById('infoVideoCodec').textContent = info.videoCodec || '未知';
            document.getElementById('infoAudioFormat').textContent = info.audioFormat || '未知';
            document.getElementById('infoAudioSize').textContent = info.audioSize || '未知';
            document.getElementById('infoVideoBitrate').textContent = info.videoBitrate || '未知';
            document.getElementById('infoAudioBitrate').textContent = info.audioBitrate || '未知';
            document.getElementById('infoFPS').textContent = info.fps || '未知';
            
            // 更新视频缩略图
            await updateVideoThumbnail();
            
            // 显示弹窗
            document.getElementById('videoInfoModal').style.display = 'flex';
        }
        
        // 更新视频缩略图
        async function updateVideoThumbnail() {
            const thumbnailImg = document.getElementById('videoThumbnail');
            
            if (videoPlayer && videoPlayer.duration > 0) {
                try {
                    // 创建canvas来截取视频帧
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 设置canvas尺寸为缩略图尺寸
                    canvas.width = 120;
                    canvas.height = 80;
                    
                    // 截取当前播放位置的帧作为缩略图
                    ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);
                    
                    // 将canvas转换为base64图片
                    const thumbnailDataUrl = canvas.toDataURL('image/png');
                    
                    // 更新缩略图显示
                    thumbnailImg.src = thumbnailDataUrl;
                    
                    console.log('视频缩略图已更新');
                } catch (error) {
                    console.error('生成视频缩略图失败:', error);
                    // 如果失败，使用默认图片
                    thumbnailImg.src = '4204bf80-b41f-46fb-8d4e-8ef4f9efe583.png';
                }
            } else {
                // 视频未加载时使用默认图片
                thumbnailImg.src = '4204bf80-b41f-46fb-8d4e-8ef4f9efe583.png';
            }
        }
        
        // 获取视频详细信息
        async function getVideoInfo(url) {
            const info = {
                format: '未知',
                size: '未知',
                videoCodec: '未知',
                audioFormat: '未知',
                audioSize: '未知',
                videoBitrate: '未知',
                audioBitrate: '未知',
                fps: '未知'
            };
            
            // 从URL获取格式
            const ext = url.split('.').pop().toLowerCase();
            const formats = {
                'mp4': 'MP4 (MPEG-4)',
                'webm': 'WebM',
                'ogg': 'OGG',
                'mov': 'MOV (QuickTime)',
                'avi': 'AVI',
                'mkv': 'MKV (Matroska)'
            };
            info.format = formats[ext] || ext.toUpperCase();
            
            // 获取文件大小
            try {
                const response = await fetch(url, { method: 'HEAD' });
                const contentLength = response.headers.get('Content-Length');
                if (contentLength) {
                    const bytes = parseInt(contentLength);
                    if (bytes < 1024) {
                        info.size = bytes + ' B';
                    } else if (bytes < 1024 * 1024) {
                        info.size = (bytes / 1024).toFixed(2) + ' KB';
                    } else {
                        info.size = (bytes / (1024 * 1024)).toFixed(2) + ' MB';
                    }
                }
            } catch (e) {
                console.error('获取文件大小失败:', e);
            }
            
            // 如果视频已加载，获取更多信息
            if (videoPlayer.duration > 0) {
                // 计算视频码率（估算）
                if (videoPlayer.duration > 0 && videoPlayer.buffered.length > 0 && videoPlayer.videoWidth > 0 && videoPlayer.videoHeight > 0) {
                    const bufferedBytes = videoPlayer.buffered.end(videoPlayer.buffered.length - 1) * videoPlayer.videoWidth * videoPlayer.videoHeight * 4;
                    const bitrate = (bufferedBytes * 8 / videoPlayer.duration / 1024).toFixed(0);
                    info.videoBitrate = bitrate + ' kbps';
                } else if (videoPlayer.videoWidth > 0 && videoPlayer.videoHeight > 0) {
                    // 简化估算：基于分辨率和帧率估算码率
                    const pixels = videoPlayer.videoWidth * videoPlayer.videoHeight;
                    const estimatedBitrate = (pixels * 30 * 0.1) / 1024; // 约30fps，每像素0.1bit
                    info.videoBitrate = estimatedBitrate.toFixed(0) + ' kbps';
                }
                
                // 计算音频大小和码率（估算）
                // 假设音频比特率为128kbps（常见值）
                const audioBitrate = 128000;
                const audioSizeInBytes = (audioBitrate * videoPlayer.duration) / 8;
                info.audioBitrate = '128 kbps';
                
                if (audioSizeInBytes < 1024) {
                    info.audioSize = audioSizeInBytes.toFixed(0) + ' B';
                } else if (audioSizeInBytes < 1024 * 1024) {
                    info.audioSize = (audioSizeInBytes / 1024).toFixed(2) + ' KB';
                } else {
                    info.audioSize = (audioSizeInBytes / (1024 * 1024)).toFixed(2) + ' MB';
                }
                
                // 获取FPS
                if (videoPlayer.getVideoPlaybackQuality) {
                    const quality = videoPlayer.getVideoPlaybackQuality();
                    info.fps = quality.framesPerSecond ? quality.framesPerSecond.toFixed(1) + ' FPS' : '未知';
                } else if (videoPlayer.videoTracks && videoPlayer.videoTracks[0]) {
                    // 尝试从视频轨道获取帧率
                    const track = videoPlayer.videoTracks[0];
                    if (track.getSettings) {
                        const settings = track.getSettings();
                        info.fps = settings.frameRate ? settings.frameRate.toFixed(1) + ' FPS' : '未知';
                    } else {
                        info.fps = '约30 FPS';
                    }
                } else {
                    info.fps = '约30 FPS';
                }
            }
            
            // 尝试获取更多元数据
            try {
                const mediaSource = videoPlayer.src;
                if (mediaSource) {
                    // 尝试从视频元素获取信息
                    info.videoCodec = videoPlayer.videoTracks && videoPlayer.videoTracks[0] 
                        ? videoPlayer.videoTracks[0].label || 'H.264/AVC'
                        : 'H.264/AVC';
                    info.audioFormat = videoPlayer.audioTracks && videoPlayer.audioTracks[0]
                        ? videoPlayer.audioTracks[0].label || 'AAC'
                        : 'AAC';
                }
            } catch (e) {
                console.error('获取视频元数据失败:', e);
            }
            
            return info;
        }
        
        // 关闭视频信息弹窗
        function closeVideoInfoModal() {
            document.getElementById('videoInfoModal').style.display = 'none';
        }
        
        // 更新进度条
        function updateProgress() {
            if (isNaN(videoPlayer.duration) || videoPlayer.duration === 0) {
                return;
            }
            const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
            progressBar.style.width = `${percent}%`;
            progressHandle.style.left = `${percent}%`;
        }
        
        // 更新时间显示
        function updateTimeDisplay() {
            const currentTime = formatTime(videoPlayer.currentTime);
            const duration = formatTime(videoPlayer.duration);
            timeDisplay.textContent = `${currentTime} / ${duration}`;
        }
        
        // 格式化时间
        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const minutes = Math.floor(seconds / 60);
            seconds = Math.floor(seconds % 60);
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // 点击进度条
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            videoPlayer.currentTime = percent * videoPlayer.duration;
        });
        
        // 进度条手柄拖拽
        let isDraggingProgress = false;
        
        progressHandle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isDraggingProgress = true;
            document.addEventListener('mousemove', onProgressDrag);
            document.addEventListener('mouseup', onProgressDragEnd);
        });
        
        function onProgressDrag(e) {
            if (!isDraggingProgress) return;
            
            const rect = progressContainer.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            videoPlayer.currentTime = percent * videoPlayer.duration;
        }
        
        function onProgressDragEnd() {
            isDraggingProgress = false;
            document.removeEventListener('mousemove', onProgressDrag);
            document.removeEventListener('mouseup', onProgressDragEnd);
        }
        
        // 显示右键菜单
        function showContextMenu(e) {
            e.preventDefault();
            contextMenu.style.display = 'block';
            contextMenu.style.left = `${e.clientX}px`;
            contextMenu.style.top = `${e.clientY}px`;
        }
        
        // 隐藏右键菜单
        function hideContextMenu() {
            contextMenu.style.display = 'none';
        }
        
        // 切换循环播放
        function toggleLoop() {
            isLoop = !isLoop;
            videoPlayer.loop = isLoop;
            
            if (isLoop) {
                loopBtn.style.color = '#3498db';
                loopBtn.style.background = 'rgba(52, 152, 219, 0.2)';
            } else {
                loopBtn.style.color = '#ffffff';
                loopBtn.style.background = 'none';
            }
        }
        
        // 开始计算FPS
        function startFpsCalculation() {
            if (fpsIntervalId) {
                cancelAnimationFrame(fpsIntervalId);
            }
            
            fpsFrameCount = 0;
            fpsLastTime = Date.now();
            
            const calculateFps = () => {
                fpsFrameCount++;
                const currentTime = Date.now();
                
                if (currentTime - fpsLastTime >= 1000) {
                    const fps = fpsFrameCount;
                    fpsFrameCount = 0;
                    fpsLastTime = currentTime;
                    
                    // 更新FPS显示
                    updateFpsDisplay(fps);
                }
                
                fpsIntervalId = requestAnimationFrame(calculateFps);
            };
            
            calculateFps();
        }
        
        // 停止FPS计算
        function stopFpsCalculation() {
            if (fpsIntervalId) {
                cancelAnimationFrame(fpsIntervalId);
                fpsIntervalId = null;
            }
        }
        
        // 更新FPS显示
        function updateFpsDisplay(fps) {
            const fpsEl = document.getElementById('infoFPS');
            if (fpsEl) {
                fpsEl.textContent = fps + ' FPS';
            }
        }
        
        // 设置倍速
        function setPlaybackSpeed(speed) {
            videoPlayer.playbackRate = speed;
            const speedText = document.getElementById('speedText');
            const speedOptions = document.querySelectorAll('.speed-option');
            
            speedText.textContent = speed + 'x';
            
            speedOptions.forEach(option => {
                option.classList.remove('active');
                if (parseFloat(option.dataset.speed) === speed) {
                    option.classList.add('active');
                }
            });
            
            hideSpeedMenu();
        }
        
        // 显示倍速菜单
        function showSpeedMenu() {
            const speedMenu = document.getElementById('speedMenu');
            speedMenu.classList.add('visible');
        }
        
        // 隐藏倍速菜单
        function hideSpeedMenu() {
            const speedMenu = document.getElementById('speedMenu');
            speedMenu.classList.remove('visible');
        }
        
        // 切换画中画模式
        async function togglePictureInPicture() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else {
                    await videoPlayer.requestPictureInPicture();
                }
            } catch (error) {
                console.error('画中画模式切换失败:', error);
                alert('您的浏览器不支持画中画功能');
            }
        }
        
        // 监听画中画状态变化
        videoPlayer.addEventListener('enterpictureinpicture', () => {
            const settingsPip = document.getElementById('settingsPip');
            settingsPip.classList.add('active');
        });
        
        videoPlayer.addEventListener('leavepictureinpicture', () => {
            const settingsPip = document.getElementById('settingsPip');
            settingsPip.classList.remove('active');
        });
        
        // 镜像画面功能
        let isMirrored = false;
        
        function toggleMirror() {
            isMirrored = !isMirrored;
            const settingsMirror = document.getElementById('settingsMirror');
            
            if (isMirrored) {
                videoPlayer.style.transform = 'scaleX(-1)';
                settingsMirror.classList.add('active');
            } else {
                videoPlayer.style.transform = '';
                settingsMirror.classList.remove('active');
            }
        }
        
        // 显示设置菜单
        function showSettingsMenu() {
            const settingsMenu = document.getElementById('settingsMenu');
            settingsMenu.classList.add('visible');
        }
        
        // 隐藏设置菜单
        function hideSettingsMenu() {
            const settingsMenu = document.getElementById('settingsMenu');
            settingsMenu.classList.remove('visible');
        }
        
        // 绑定事件
        playPauseBtn.addEventListener('click', togglePlayPause);
        playPauseControl.addEventListener('click', togglePlayPause);
        volumeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleVolumeSlider();
        });
        volumeBtn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            toggleMute();
        });
        downloadBtn.addEventListener('click', downloadVideo);
        settingsPip.addEventListener('click', togglePictureInPicture);
        settingsMirror.addEventListener('click', toggleMirror);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        loopBtn.addEventListener('click', toggleLoop);
        volumeSlider.addEventListener('click', (e) => {
            e.stopPropagation();
            adjustVolume(e);
        });
        
        // 设置按钮点击事件 - 切换菜单显示
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (settingsMenu.classList.contains('visible')) {
                hideSettingsMenu();
            } else {
                showSettingsMenu();
            }
        });
        
        // 倍速按钮点击事件 - 切换菜单显示
        const speedBtn = document.getElementById('speedBtn');
        const speedMenu = document.getElementById('speedMenu');
        
        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (speedMenu.classList.contains('visible')) {
                hideSpeedMenu();
            } else {
                showSpeedMenu();
            }
        });
        
        // 点击页面其他地方关闭菜单
        document.addEventListener('click', (e) => {
            if (!speedBtn.contains(e.target) && !speedMenu.contains(e.target)) {
                hideSpeedMenu();
            }
            if (!settingsBtn.contains(e.target) && !settingsMenu.contains(e.target)) {
                hideSettingsMenu();
            }
        });
        
        // 倍速选项点击事件
        const speedOptions = document.querySelectorAll('.speed-option');
        speedOptions.forEach(option => {
            option.addEventListener('click', () => {
                const speed = parseFloat(option.dataset.speed);
                setPlaybackSpeed(speed);
            });
        });
        
        videoWrapper.addEventListener('contextmenu', showContextMenu);
        document.addEventListener('click', hideContextMenu);
        
        // 菜单点击事件
        contextMenu.addEventListener('click', (e) => {
            let action = e.target.dataset.action;
            switch (action) {
                case 'playPause':
                    togglePlayPause();
                    break;
                case 'mute':
                    toggleMute();
                    break;
                case 'download':
                    downloadVideo();
                    break;
                case 'fullscreen':
                    toggleFullscreen();
                    break;
                case 'videoInfo':
                    showVideoInfo();
                    break;
            }
        });
        
        // 窗口关闭时恢复任务栏图标和按钮状态
        window.addEventListener('beforeunload', () => {
            setVideoPlaybackStatus(false);
            
            // 暂停视频
            videoPlayer.pause();
            
            // 恢复播放按钮为默认的播放图标
            playPauseBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            `;
            playPauseControl.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            `;
            
            // 恢复音量按钮为默认图标（非静音状态）
            volumeBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                </svg>
            `;
            
            // 隐藏音量滑块
            const volumeSliderWrapper = document.getElementById('volumeSliderWrapper');
            if (volumeSliderWrapper) {
                volumeSliderWrapper.classList.remove('visible');
            }
        });
        
        // 弹窗关闭事件
        document.getElementById('closeModal').addEventListener('click', closeVideoInfoModal);
        document.getElementById('okBtn').addEventListener('click', closeVideoInfoModal);
        
        // 点击弹窗外部关闭
        document.getElementById('videoInfoModal').addEventListener('click', (e) => {
            if (e.target.id === 'videoInfoModal') {
                closeVideoInfoModal();
            }
        });
        
        // 初始化
        initPlayer();
    </script>
</body>
</html>
