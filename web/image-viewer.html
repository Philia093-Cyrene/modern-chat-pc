<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片查看器 - Modern Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .file-name {
            font-size: 14px;
            font-weight: 500;
            color: #667eea;
        }
        
        .viewer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: auto;
        }
        
        .viewer-container::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        .viewer-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
        }
        
        .viewer-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            border: 3px solid rgba(0, 0, 0, 0);
            background-clip: padding-box;
        }
        
        .viewer-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        
        .image-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.2s ease;
        }
        
        .image-info {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #cccccc;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .image-wrapper:hover .image-info {
            opacity: 1;
        }
        
        .toolbar {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        
        .tool-btn {
            background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 80px;
            justify-content: center;
        }
        
        .tool-btn:hover {
            background: linear-gradient(135deg, #4a4a4a 0%, #3a3a3a 100%);
            border-color: rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }
        
        .tool-btn:active {
            transform: translateY(0);
        }
        
        .tool-btn svg {
            width: 18px;
            height: 18px;
        }
        
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 8px;
        }
        
        .zoom-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ffffff;
            font-size: 18px;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .zoom-level {
            font-size: 14px;
            color: #888;
            min-width: 50px;
            text-align: center;
        }
        
        .menu {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .menu-item {
            padding: 12px 24px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s ease;
            min-width: 140px;
        }
        
        .menu-item:hover {
            background: rgba(102, 126, 234, 0.3);
        }
        
        .menu-separator {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: #667eea;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span>Modern-chat - 图片查看器</span>
            <span class="file-name" id="fileName"></span>
        </div>
    </div>
    <div class="viewer-container">
        <div class="image-wrapper" id="imageWrapper">
            <img id="imageViewer" alt="图片">
            <div class="image-info" id="imageStats">正在加载...</div>
        </div>
    </div>
    <div class="toolbar">
        <button class="tool-btn" id="zoomOutBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
            缩小
        </button>
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomOutBtn2">-</button>
            <span class="zoom-level" id="zoomLevel">100%</span>
            <button class="zoom-btn" id="zoomInBtn2">+</button>
        </div>
        <button class="tool-btn" id="zoomInBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="11" y1="8" x2="11" y2="14"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
            放大
        </button>
        <div style="width: 1px; height: 32px; background: rgba(255, 255, 255, 0.1);"></div>
        <button class="tool-btn" id="copyBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            复制图片
        </button>
        <button class="tool-btn" id="downloadBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            保存到下载目录
        </button>
        <button class="tool-btn" id="fullscreenBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
            全屏
        </button>
    </div>
    
    <div class="menu" id="contextMenu">
        <div class="menu-item" data-action="copy">复制图片</div>
        <div class="menu-item" data-action="download">保存到下载目录</div>
        <div class="menu-separator"></div>
        <div class="menu-item" data-action="zoomIn">放大</div>
        <div class="menu-item" data-action="zoomOut">缩小</div>
        <div class="menu-separator"></div>
        <div class="menu-item" data-action="fullscreen">全屏</div>
    </div>

    <script>
        let imageViewer = document.getElementById('imageViewer');
        let downloadBtn = document.getElementById('downloadBtn');
        let fullscreenBtn = document.getElementById('fullscreenBtn');
        let zoomInBtn = document.getElementById('zoomInBtn');
        let zoomOutBtn = document.getElementById('zoomOutBtn');
        let zoomInBtn2 = document.getElementById('zoomInBtn2');
        let zoomOutBtn2 = document.getElementById('zoomOutBtn2');
        let copyBtn = document.getElementById('copyBtn');
        let imageWrapper = document.getElementById('imageWrapper');
        let contextMenu = document.getElementById('contextMenu');
        let fileName = document.getElementById('fileName');
        let imageStats = document.getElementById('imageStats');
        let zoomLevelEl = document.getElementById('zoomLevel');
        
        let zoomLevel = 1;
        
        function getUrlParams() {
            let params = {};
            let search = window.location.search.substring(1);
            let pairs = search.split('&');
            for (let pair of pairs) {
                let [key, value] = pair.split('=');
                params[decodeURIComponent(key)] = decodeURIComponent(value);
            }
            return params;
        }
        
        function initViewer() {
            let params = getUrlParams();
            let imageUrl = params.url;
            let imageName = params.name || '图片';
            
            if (imageName.startsWith('uploads/')) {
                imageName = imageName.substring('uploads/'.length);
            }
            
            if (imageUrl) {
                imageViewer.src = imageUrl;
                fileName.textContent = `[${imageName}]`;
                document.title = `Modern-chat - 图片查看器[${imageName}]`;
                
                imageViewer.addEventListener('load', () => {
                    imageStats.textContent = `${imageViewer.naturalWidth} × ${imageViewer.naturalHeight}`;
                });
            }
        }
        
        async function downloadImage() {
            try {
                const response = await fetch(imageViewer.src);
                const blob = await response.blob();
                const imageName = fileName.textContent.replace(/\[|\]/g, '') || '图片.png';
                
                if (window.electronAPI && window.electronAPI.fs && window.electronAPI.fs.saveFile) {
                    const buffer = await blob.arrayBuffer();
                    const result = await window.electronAPI.fs.saveFile(buffer, imageName);
                    if (result.success) {
                        alert('图片已保存到: ' + result.path);
                    } else {
                        alert('保存失败: ' + result.message);
                    }
                } else {
                    let link = document.createElement('a');
                    link.download = imageName;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                }
            } catch (error) {
                console.error('下载失败:', error);
                alert('下载失败，请重试');
            }
        }
        
        function copyImage() {
            fetch(imageViewer.src)
                .then(response => response.blob())
                .then(blob => {
                    navigator.clipboard.write([
                        new ClipboardItem({
                            'image/png': blob
                        })
                    ]).then(() => {
                        alert('图片已复制到剪贴板');
                    }).catch(err => {
                        console.error('复制失败:', err);
                        alert('复制失败，请手动复制');
                    });
                });
        }
        
        function updateZoom() {
            imageViewer.style.transform = `scale(${zoomLevel})`;
            zoomLevelEl.textContent = `${Math.round(zoomLevel * 100)}%`;
        }
        
        function zoomIn() {
            if (zoomLevel < 10) {
                zoomLevel += 0.1;
                updateZoom();
            }
        }
        
        function zoomOut() {
            if (zoomLevel > 0.1) {
                zoomLevel -= 0.1;
                updateZoom();
            }
        }
        
        function handleWheel(e) {
            e.preventDefault();
            if (e.deltaY > 0) {
                if (zoomLevel > 0.1) {
                    zoomOut();
                }
            } else {
                if (zoomLevel < 10) {
                    zoomIn();
                }
            }
        }
        
        imageWrapper.addEventListener('wheel', handleWheel);
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`全屏错误: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function showContextMenu(e) {
            e.preventDefault();
            contextMenu.style.display = 'block';
            contextMenu.style.left = `${e.clientX}px`;
            contextMenu.style.top = `${e.clientY}px`;
        }
        
        function hideContextMenu() {
            contextMenu.style.display = 'none';
        }
        
        downloadBtn.addEventListener('click', downloadImage);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        zoomInBtn.addEventListener('click', zoomIn);
        zoomOutBtn.addEventListener('click', zoomOut);
        zoomInBtn2.addEventListener('click', zoomIn);
        zoomOutBtn2.addEventListener('click', zoomOut);
        copyBtn.addEventListener('click', copyImage);
        
        imageWrapper.addEventListener('contextmenu', showContextMenu);
        document.addEventListener('click', hideContextMenu);
        
        contextMenu.addEventListener('click', (e) => {
            let action = e.target.dataset.action;
            switch (action) {
                case 'download':
                    downloadImage();
                    break;
                case 'copy':
                    copyImage();
                    break;
                case 'zoomIn':
                    zoomIn();
                    break;
                case 'zoomOut':
                    zoomOut();
                    break;
                case 'fullscreen':
                    toggleFullscreen();
                    break;
            }
        });
        
        initViewer();
    </script>
</body>
</html>
