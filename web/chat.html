<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="js/css/layui.css">
</head>
<body>
    <div class="chat-container">
        <div class="nav-bar">
            <div class="nav-top">
                <div class="nav-item active" data-tab="messages" title="消息">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/>
                    </svg>
                </div>
                <div class="nav-item" data-tab="friends" title="好友">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <div class="nav-item" data-tab="groups" title="群聊">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                </div>
                <div class="nav-item" data-mode="search" title="搜索用户与群聊">
                    <i class="layui-icon layui-icon-add-1"></i>
                </div>
                <div class="nav-item" data-mode="audit" title="好友与入群审核">
                    <i class="layui-icon layui-icon-email"></i>
                </div>
                <div class="nav-item" title="收藏">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                    </svg>
                </div>
                <div class="nav-item" id="settingsBtn" title="设置">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
            </div>
            <div class="nav-bottom">
                <div class="nav-item" id="logoutBtn" title="退出登录">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </div>
            </div>
        </div>

        <div class="contact-panel">
            <div class="panel-header">
                <div class="user-profile-mini">
                    <div class="user-avatar-mini">
                        <img id="userAvatar" src="" alt="用户头像">
                        <div class="user-status-mini"></div>
                    </div>
                    <div class="user-info-mini">
                        <div class="user-name-mini" id="userNameMini">用户</div>
                        <div class="user-email-mini" id="userEmailMini">user@example.com</div>
                    </div>
                </div>
                <h3 id="panelTitle">消息</h3>
                <div class="panel-actions">
                    <button class="panel-btn" title="添加">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索">
            </div>
            
            <div class="contacts-list" id="contactsList">
            </div>
        </div>
        
        <div class="chat-main" id="chatMain">
            <div class="empty-state" id="emptyState">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                <p>请选择一个聊天</p>
            </div>
            
            <div id="chatContent" style="display: none;">
                <div class="chat-header" id="chatHeader">
                </div>
                
                <div class="chat-messages" id="chatMessages">
                </div>
                
                <div class="chat-input">
                    <div class="input-tools-top">
                        <button class="tool-btn" id="audioBtn" title="录音">
                            <i class="layui-icon layui-icon-mike"></i>
                        </button>
                        <button class="tool-btn" id="cameraBtn" title="截图 (Ctrl+Alt+D)">
                            <i class="layui-icon layui-icon-camera"></i>
                        </button>
                        <button class="tool-btn" id="uploadBtn" title="文件上传">
                            <i class="layui-icon layui-icon-upload"></i>
                        </button>
                    </div>
                    <div class="input-row">
                        <div class="input-wrapper">
                            <textarea class="input-area" id="messageInput" placeholder="输入消息..." rows="3"></textarea>
                        </div>
                        <button class="send-btn" id="sendBtn" title="发送">
                            <i class="layui-icon layui-icon-release"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/layui.js"></script>
    <script src="js/chat.js"></script>
    
    <!-- 更新弹窗 -->
    <div class="update-modal" id="updateModal" style="display: none;">
        <div class="update-modal-content">
            <div class="update-modal-header">
                <div class="update-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                </div>
                <h2>检测到新更新 - Modern-chat 电脑端</h2>
            </div>
            <div class="update-modal-body">
                <div class="version-info">
                    <span class="version-label">版本更新！</span>
                    <span class="version-current" id="currentVersion">V0.0.2</span>
                    <span class="version-arrow">→</span>
                    <span class="version-new" id="updateVersion">V0.0.2</span>
                </div>
                <div class="update-message-box">
                    <h3>更新内容：</h3>
                    <pre id="updateMessage"></pre>
                </div>
            </div>
            <div class="update-modal-footer">
                <button class="update-btn" id="updateBtn">立即更新</button>
                <button class="skip-btn" id="skipBtn" style="display: none;">跳过更新</button>
            </div>
            <div class="update-progress" id="updateProgress" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">下载中... 0%</div>
            </div>
        </div>
    </div>
</body>
</html>
